name: create_fulfillment
domain: orders
description: Create a fulfillment (mark as shipped) with tracking info. Requires a fulfillment order ID from get_fulfillment_orders.
scopes:
  - write_assigned_fulfillment_orders
input:
  fulfillment_order_id:
    type: string
    description: Fulfillment order GID (get this from get_fulfillment_orders tool)
    required: true
  tracking_company:
    type: string
    description: Carrier name (e.g. UPS, FedEx, DHL, BlueDart)
    required: false
  tracking_number:
    type: string
    description: Tracking number
    required: false
  tracking_url:
    type: string
    description: Tracking URL
    required: false
  notify_customer:
    type: boolean
    description: Send shipping notification email to customer
    required: false
graphql: |
  mutation CreateFulfillment($fulfillment_order_id: ID!, $tracking_company: String, $tracking_number: String, $tracking_url: URL, $notify_customer: Boolean) {
    fulfillmentCreate(fulfillment: {
      lineItemsByFulfillmentOrder: [{ fulfillmentOrderId: $fulfillment_order_id }]
      trackingInfo: {
        company: $tracking_company
        number: $tracking_number
        url: $tracking_url
      }
      notifyCustomer: $notify_customer
    }) {
      fulfillment {
        id
        status
        createdAt
        trackingInfo {
          company
          number
          url
        }
      }
      userErrors { field message }
    }
  }
response:
  mapping: data.fulfillmentCreate
